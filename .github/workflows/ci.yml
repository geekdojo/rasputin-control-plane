name: ci

# Safety net for every push and PR. Two jobs in parallel:
#
#   backend  — gofmt + go vet + go build + go test for the three modules in
#              the workspace (api / agent / proto). Test coverage is
#              uploaded as a build artifact so we can watch it trend over
#              time. Failures gate merges via branch-protection (configured
#              outside this file).
#
#   frontend — TypeScript type-check + Next.js production build. Catches
#              type regressions and build-time errors (Server Components,
#              missing 'use client', stale imports) that tsc alone misses.
#
# Conventions match release.yml: Go 1.25, actions/setup-go@v5 with cache
# keyed on the workspace's go.sum files.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Opt into the Node.js 24 runner for JavaScript-based actions now, ahead of
# the GitHub-forced migration on 2026-06-16. Removes the deprecation
# annotation that the first run flagged.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  backend:
    name: backend (vet + test + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: |
            api/go.sum
            agent/go.sum

      # gofmt -l prints unformatted files; if its output is non-empty,
      # fail the job. Cheaper signal than running goimports in CI.
      - name: gofmt
        run: |
          unformatted=$(gofmt -l api/ agent/ proto/)
          if [ -n "$unformatted" ]; then
            echo "::error::gofmt would change these files:"
            echo "$unformatted"
            exit 1
          fi

      - name: vet
        run: |
          go vet ./api/...
          go vet ./agent/...
          go vet ./proto/...

      # Coverage profile only for api (only module with tests today).
      # Once agent and proto grow tests, fold them into a combined profile.
      - name: test (api with coverage)
        run: |
          go test -race -coverprofile=api.coverage.out -covermode=atomic ./api/...

      - name: test (agent)
        run: go test -race ./agent/...

      - name: test (proto)
        run: go test -race ./proto/...

      - name: coverage summary
        run: |
          go tool cover -func=api.coverage.out | tail -1

      - name: build (api)
        run: go build ./api/...

      - name: build (agent)
        run: go build ./agent/...

      - name: build (proto)
        run: go build ./proto/...

      - name: upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: api.coverage.out
          retention-days: 30

  frontend:
    name: frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Project Node: current LTS (Node 22, LTS through April 2027).
          # Next.js 15 documented support: 18.18+, 20, 22. Not bumping to
          # 24 until it goes LTS in October 2026.
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: install
        run: npm ci

      - name: typecheck
        run: npm run type-check

      # Next build catches a class of errors tsc doesn't: missing 'use
      # client' directives, server/client component boundary violations,
      # bad dynamic imports.
      - name: build
        env:
          # The build doesn't need a real api at compile time, but
          # next.config.mjs reads NEXT_PUBLIC_API_BASE. Setting it to a
          # well-formed dev value avoids any "API URL undefined" warnings
          # baked into the bundle.
          NEXT_PUBLIC_API_BASE: "http://localhost:8080"
        run: npm run build
