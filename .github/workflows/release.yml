name: release

# Publishes the statically-linked control-plane binaries that the OS-image
# pipeline (rasputin-os) vendors. See os-images/buildroot-os.md §5.
#
# Binaries are pure-Go (CGO_ENABLED=0), so one build per GOARCH yields a
# libc-independent static ELF that runs on the Buildroot OS *and* OpenWrt.
#
# Triggers:
#   - push of a v* tag (e.g. v0.1.0)  → publish a Release with that version
#   - manual dispatch with a version  → dry-run / ad-hoc build

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without leading v (e.g. 0.1.0)"
        required: true
        type: string

permissions:
  contents: write   # create the release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          # cache keyed on the workspace go.sum files
          cache-dependency-path: |
            api/go.sum
            agent/go.sum

      # Node for the web UI build (build-release.sh runs npm ci + next
      # build and packs ui/out into the api tarballs). Version pin
      # rationale lives in ci.yml's frontend job.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Resolve version
        id: ver
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="${{ inputs.version }}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          # A semver pre-release (anything with a hyphen, e.g. 0.8.7-dev.1) maps
          # to the dev channel + GitHub prerelease; a clean x.y.z is stable.
          case "$V" in
            *-*) echo "prerelease=true"  >> "$GITHUB_OUTPUT"; echo "channel=dev"    >> "$GITHUB_OUTPUT" ;;
            *)   echo "prerelease=false" >> "$GITHUB_OUTPUT"; echo "channel=stable" >> "$GITHUB_OUTPUT" ;;
          esac
          echo "Building version $V"

      - name: Build release artifacts
        run: ./scripts/build-release.sh "${{ steps.ver.outputs.version }}"

      # Tag push → publish a GitHub Release with the tarballs + checksums.
      # rasputin-os fetches these from
      #   .../releases/download/v<version>/rasputin-<comp>-<version>-linux-<arch>.tar.gz
      - name: Publish release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PRERELEASE_FLAG=""
          [ "${{ steps.ver.outputs.prerelease }}" = "true" ] && PRERELEASE_FLAG="--prerelease"
          gh release create "${GITHUB_REF_NAME}" \
            --title "Rasputin control plane ${GITHUB_REF_NAME}" \
            --notes "Static linux binaries for the OS-image pipeline (agent + api, amd64 + arm64; the api tarball bundles the web UI). Vendored by rasputin-os; verify with the published .sha256 / .hash." \
            $PRERELEASE_FLAG \
            dist/*.tar.gz dist/*.sha256 dist/*.hash

      # Mirror an informational version manifest to the PUBLIC release channel
      # (geekdojo/rasputin-releases), tag "cp-<version>". Check for Updates shows
      # the control-plane software version, but it isn't deployed via the channel
      # (it ships inside the OS image), so we mirror only a tiny manifest.json —
      # not the binaries. RASPUTIN_RELEASES is an org secret (Contents:write on
      # rasputin-releases). Idempotent (create-or-clobber).
      - name: Mirror version to public release channel
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.RASPUTIN_RELEASES }}
        run: |
          set -eu
          CHANNEL="${{ steps.ver.outputs.channel }}"
          PRERELEASE_FLAG=""
          [ "${{ steps.ver.outputs.prerelease }}" = "true" ] && PRERELEASE_FLAG="--prerelease"
          mkdir -p relmirror
          printf '{"version":"%s","channel":"%s","artifacts":[]}\n' "${GITHUB_REF_NAME}" "$CHANNEL" > relmirror/manifest.json
          tag="cp-${GITHUB_REF_NAME}"
          gh release create "$tag" --repo geekdojo/rasputin-releases \
            --title "Rasputin control plane ${GITHUB_REF_NAME}" \
            --notes "Informational version manifest ($CHANNEL channel). Control-plane software ships inside the OS image; update the OS to update it." \
            $PRERELEASE_FLAG \
            relmirror/manifest.json \
          || gh release upload "$tag" --repo geekdojo/rasputin-releases --clobber relmirror/manifest.json

      # Manual dispatch → just keep the artifacts for inspection.
      - name: Upload artifacts (dispatch dry-run)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.ver.outputs.version }}
          path: dist/
