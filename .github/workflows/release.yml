name: release

# Publishes the statically-linked control-plane binaries that the OS-image
# pipeline (rasputin-os) vendors. See os-images/buildroot-os.md §5.
#
# Binaries are pure-Go (CGO_ENABLED=0), so one build per GOARCH yields a
# libc-independent static ELF that runs on the Buildroot OS *and* OpenWrt.
#
# Triggers:
#   - push of a v* tag (e.g. v2026.07.1 or v2026.07.1-dev.1) → publish a Release
#   - manual dispatch (publish=false) → bench dry-run, artifacts only
#   - manual dispatch (publish=true)  → publish a dev release versioned
#       ${vars.RASPUTIN_VERSION}-dev.<run> (dev.N = run number). The release base
#       (YYYY.MM.MICRO CalVer) comes from the org var RASPUTIN_VERSION, shared
#       with rasputin-os / -openwrt-firewall for lockstep. Versions are CalVer
#       now (was semver) — CalVer's year >> the old 0.x major, so an OS still
#       reporting an old semver agent sees CalVer as a clean upgrade.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish a dev release (versioned from org var RASPUTIN_VERSION). Off = bench dry-run, artifacts only."
        type: boolean
        default: false

permissions:
  contents: write   # create the release + upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          # cache keyed on the workspace go.sum files
          cache-dependency-path: |
            api/go.sum
            agent/go.sum

      # Node for the web UI build (build-release.sh runs npm ci + next
      # build and packs ui/out into the api tarballs). Version pin
      # rationale lives in ci.yml's frontend job.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Resolve version
        id: ver
        # TARGET_VERSION = org var RASPUTIN_VERSION (current dev target, CalVer
        # YYYY.MM.MICRO), shared across the three Rasputin repos for lockstep.
        env:
          TARGET_VERSION: ${{ vars.RASPUTIN_VERSION }}
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          else
            if [ -z "${TARGET_VERSION}" ]; then
              echo "::error::org var RASPUTIN_VERSION is unset — set it to the current dev target (e.g. 2026.07.1): gh variable set RASPUTIN_VERSION --org geekdojo --body 2026.07.1 --visibility all"
              exit 1
            fi
            V="${TARGET_VERSION}-dev.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          # Release tag is always v<version> (the OS .mk downloads from
          # .../releases/download/v<version>/...). On a tag push this equals the
          # pushed ref; on a dispatch-publish it tags the dispatched commit.
          echo "tag=v$V" >> "$GITHUB_OUTPUT"
          # A pre-release (anything with a hyphen, e.g. 2026.07.1-dev.73) maps to
          # the dev channel + GitHub prerelease; a clean CalVer is stable.
          case "$V" in
            *-*) echo "prerelease=true"  >> "$GITHUB_OUTPUT"; echo "channel=dev"    >> "$GITHUB_OUTPUT" ;;
            *)   echo "prerelease=false" >> "$GITHUB_OUTPUT"; echo "channel=stable" >> "$GITHUB_OUTPUT" ;;
          esac
          echo "Building version $V"

      - name: Build release artifacts
        run: ./scripts/build-release.sh "${{ steps.ver.outputs.version }}"

      # Tag push → publish a GitHub Release with the tarballs + checksums.
      # rasputin-os fetches these from
      #   .../releases/download/v<version>/rasputin-<comp>-<version>-linux-<arch>.tar.gz
      - name: Publish release
        if: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && (inputs.publish == true || inputs.publish == 'true')) }}
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          PRERELEASE_FLAG=""
          [ "${{ steps.ver.outputs.prerelease }}" = "true" ] && PRERELEASE_FLAG="--prerelease"
          gh release create "$TAG" \
            --title "Rasputin control plane $TAG" \
            --notes "Static linux binaries for the OS-image pipeline (agent + api, amd64 + arm64; the api tarball bundles the web UI). Vendored by rasputin-os; verify with the published .sha256 / .hash." \
            $PRERELEASE_FLAG \
            dist/*.tar.gz dist/*.sha256 dist/*.hash

      # Bench dispatch (publish=false) → just keep the artifacts for inspection.
      - name: Upload artifacts (dispatch dry-run)
        if: ${{ github.event_name == 'workflow_dispatch' && !(inputs.publish == true || inputs.publish == 'true') }}
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.ver.outputs.version }}
          path: dist/
