name: vuln-scan

# govulncheck over the Go workspace modules (api / agent / proto), gated
# against the checked-in baseline of known reachable vulnerabilities in
# .github/vuln-baseline.txt. Fails only when a NEW reachable advisory
# appears. Policy and rationale are documented in scripts/vuln-scan.sh.
#
# govulncheck is pinned to an exact version (not `@latest`) so a new
# release can't silently drag a newer toolchain requirement into the
# build — the trap described in CLAUDE.md's "Go gotcha" section. v1.3.0
# requires Go >= 1.25, which the toolchain pin below satisfies.
#
# The weekly schedule catches advisories published while the code sits
# still — vuln coverage decays without pushes, so don't remove it.
#
# Conventions match ci.yml: Go 1.26, actions/setup-go@v5 cached on the
# workspace's go.sum files.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 6 * * 1" # Mondays 06:30 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  govulncheck:
    name: govulncheck (baseline-gated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: |
            api/go.sum
            agent/go.sum

      - name: install govulncheck (pinned)
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.3.0

      - name: scan
        run: ./scripts/vuln-scan.sh
